document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lor:#7c8a7a;\">:root {<\u002Fdiv>\n          <sc-for list=\"{{ tokens }}\" as=\"grp\" hint-placeholder-count=\"2\">\n            <div style=\"margin:6px 0 2px;color:#7c8a7a;padding-left:14px;\">/* {{ grp.g }} */<\u002Fdiv>\n            <sc-for list=\"{{ grp.rows }}\" as=\"row\" hint-placeholder-count=\"4\">\n              <div style=\"padding-left:14px;\"><span style=\"color:#A8C3A0;\">{{ row.0 }}<\u002Fspan><span style=\"color:#cfc9c0;\">: <\u002Fspan><span style=\"color:#F4B183;\">{{ row.1 }}<\u002Fspan><span style=\"color:#cfc9c0;\">;<\u002Fspan> <span style=\"color:#6b6357;\">/* {{ row.2 }} */<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fsc-for>\n          <div style=\"color:#7c8a7a;\">}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Tailwind theme -->\n      <div style=\"background:#3D3D3D;border-radius:20px;box-shadow:0 2px 8px rgba(61,61,61,.06);padding:24px 26px;\">\n        <div style=\"font-family:'Nunito';font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#F4B183;margin-bottom:16px;\">tailwind.config.ts · theme.extend<\u002Fdiv>\n        <div style=\"font-family:'SF Mono','Menlo',monospace;font-size:12.5px;line-height:1.9;color:#cfc9c0;white-space:pre;overflow:hidden;\">\n<span style=\"color:#7c8a7a;\">colors<\u002Fspan>: {\n  <span style=\"color:#A8C3A0;\">beige<\u002Fspan>: <span style=\"color:#F4B183;\">'#E8DCCB'<\u002Fspan>,\n  <span style=\"color:#A8C3A0;\">cream<\u002Fspan>: <span style=\"color:#F4B183;\">'#F7F3EE'<\u002Fspan>,\n  <span style=\"color:#A8C3A0;\">brown<\u002Fspan>: <span style=\"color:#F4B183;\">'#A68A64'<\u002Fspan>,\n  <span style=\"color:#A8C3A0;\">sage<\u002Fspan>: <span style=\"color:#F4B183;\">'#A8C3A0'<\u002Fspan>,\n  <span style=\"color:#A8C3A0;\">apricot<\u002Fspan>: <span style=\"color:#F4B183;\">'#F4B183'<\u002Fspan>,\n},\n<span style=\"color:#7c8a7a;\">fontFamily<\u002Fspan>: {\n  <span style=\"color:#A8C3A0;\">head<\u002Fspan>: [<span style=\"color:#F4B183;\">'Quicksand'<\u002Fspan>],\n  <span style=\"color:#A8C3A0;\">body<\u002Fspan>: [<span style=\"color:#F4B183;\">'Nunito'<\u002Fspan>],\n},\n<span style=\"color:#7c8a7a;\">borderRadius<\u002Fspan>: { <span style=\"color:#A8C3A0;\">card<\u002Fspan>: <span style=\"color:#F4B183;\">'1.25rem'<\u002Fspan> },<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <!-- UI States -->\n    <div style=\"background:#fff;border-radius:20px;box-shadow:0 2px 8px rgba(61,61,61,.06);padding:26px;margin-bottom:20px;\">\n      <div style=\"font-family:'Nunito';font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#A68A64;margin-bottom:18px;\">UI state patterns<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;\">\n        <sc-for list=\"{{ states }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"background:{{ s.bg }};border-radius:16px;padding:18px;\">\n            <div style=\"font-family:'Quicksand';font-weight:700;font-size:17px;color:{{ s.c }};margin-bottom:8px;\">{{ s.t }}<\u002Fdiv>\n            <div style=\"font-size:13px;font-weight:500;line-height:1.5;color:#5f574a;\">{{ s.ex }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Voice & tone -->\n    <div style=\"background:#fff;border-radius:20px;box-shadow:0 2px 8px rgba(61,61,61,.06);padding:26px;\">\n      <div style=\"font-family:'Nunito';font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#A68A64;margin-bottom:6px;\">Voice &amp; copywriting<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.2fr 1.4fr 1.4fr;gap:0;\">\n        <div style=\"font-size:12px;font-weight:800;color:#A68A64;padding:12px 8px;border-bottom:2px solid #F1ECE3;\">PRINCIPLE<\u002Fdiv>\n        <div style=\"font-size:12px;font-weight:800;color:#5e8a52;padding:12px 8px;border-bottom:2px solid #F1ECE3;\">✓ KAOKAO SAYS<\u002Fdiv>\n        <div style=\"font-size:12px;font-weight:800;color:#c0623a;padding:12px 8px;border-bottom:2px solid #F1ECE3;\">✗ NOT<\u002Fdiv>\n        <sc-for list=\"{{ voice }}\" as=\"v\" hint-placeholder-count=\"4\">\n          <div style=\"font-size:14px;font-weight:700;color:#3D3D3D;padding:13px 8px;border-bottom:1px solid #F4EFE7;\">{{ v.0 }}<\u002Fdiv>\n          <div style=\"font-size:14px;font-weight:600;color:#3D3D3D;padding:13px 8px;border-bottom:1px solid #F4EFE7;\">\"{{ v.1 }}\"<\u002Fdiv>\n          <div style=\"font-size:14px;font-weight:500;color:#a89a82;padding:13px 8px;border-bottom:1px solid #F4EFE7;text-decoration:line-through;\">{{ v.2 }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"text-align:center;margin-top:64px;padding-top:32px;border-top:1px solid #dcd2c2;\">\n      <div style=\"font-family:'Quicksand';font-weight:700;font-size:15px;color:#A68A64;\">KAOKAO<\u002Fdiv>\n      <div style=\"font-size:13px;font-weight:600;color:#b3aa9a;margin-top:4px;\">Product Design Guide v1.0 · Bringing lost pets home, gently.<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      colors: [\n        { n: 'Warm Beige', h: '#E8DCCB', role: 'Primary surface & brand fields' },\n        { n: 'Cream', h: '#F7F3EE', role: 'App background / card insets' },\n        { n: 'Soft Brown', h: '#A68A64', role: 'Logo, headings accent, icons' },\n        { n: 'Sage Green', h: '#A8C3A0', role: 'Success, \"found\", positive' },\n        { n: 'Soft Orange', h: '#F4B183', role: 'Primary CTA, missing alerts' },\n        { n: 'White', h: '#FFFFFF', role: 'Cards & elevated surfaces' },\n        { n: 'Light Gray', h: '#F5F5F5', role: 'Dividers, disabled, fills' },\n        { n: 'Dark Text', h: '#3D3D3D', role: 'Primary text & icons' },\n      ],\n      typeScale: [\n        { name: 'Display', spec: 'Quicksand 700 · 34/40', size: '34px', lh: '40px', wt: '700', ff: \"'Quicksand'\", up: false, sample: 'Buddy is missing' },\n        { name: 'Heading 1', spec: 'Quicksand 700 · 28/34', size: '28px', lh: '34px', wt: '700', ff: \"'Quicksand'\", up: false, sample: 'Lost pets near you' },\n        { name: 'Heading 2', spec: 'Quicksand 600 · 22/28', size: '22px', lh: '28px', wt: '600', ff: \"'Quicksand'\", up: false, sample: 'Health records' },\n        { name: 'Heading 3', spec: 'Quicksand 600 · 18/24', size: '18px', lh: '24px', wt: '600', ff: \"'Quicksand'\", up: false, sample: 'Last seen location' },\n        { name: 'Body Large', spec: 'Nunito 600 · 17/26', size: '17px', lh: '26px', wt: '600', ff: \"'Nunito'\", up: false, sample: 'Tap below to send the owner your location.' },\n        { name: 'Body', spec: 'Nunito 500 · 15/23', size: '15px', lh: '23px', wt: '500', ff: \"'Nunito'\", up: false, sample: 'A golden retriever was seen near Lumphini Park around 4pm today.' },\n        { name: 'Caption', spec: 'Nunito 600 · 13/18', size: '13px', lh: '18px', wt: '600', ff: \"'Nunito'\", up: false, sample: 'Verified 2 hours ago · 1.2 km away' },\n        { name: 'Label', spec: 'Nunito 700 · 12/16 · tracked', size: '12px', lh: '16px', wt: '700', ff: \"'Nunito'\", up: true, sample: 'Section label' },\n      ],\n      spacing: [\n        { t: '4', v: 4 }, { t: '8', v: 8 }, { t: '12', v: 12 }, { t: '16', v: 16 },\n        { t: '20', v: 20 }, { t: '24', v: 24 }, { t: '32', v: 32 }, { t: '48', v: 48 },\n      ],\n      radii: [\n        { n: 'sm', v: 8, lbl: 'Chips, tags' }, { n: 'md', v: 12, lbl: 'Inputs, buttons' },\n        { n: 'lg', v: 16, lbl: 'Inner cards' }, { n: 'xl', v: 20, lbl: 'Cards' },\n        { n: '2xl', v: 28, lbl: 'Sheets, modals' }, { n: 'full', v: 999, lbl: 'Pills, avatars' },\n      ],\n      shadows: [\n        { n: 'xs', css: '0 1px 2px rgba(61,61,61,.05)', lbl: 'Hairline lift' },\n        { n: 'sm', css: '0 2px 8px rgba(61,61,61,.06)', lbl: 'Cards at rest' },\n        { n: 'md', css: '0 6px 20px rgba(61,61,61,.08)', lbl: 'Raised / hover' },\n        { n: 'lg', css: '0 16px 40px rgba(61,61,61,.12)', lbl: 'Modals, FAB' },\n      ],\n      tokens: [\n        { g: 'Color', rows: [\n          ['--background', '#F7F3EE', 'app bg'], ['--card', '#FFFFFF', 'surfaces'],\n          ['--primary', '#F4B183', 'CTA / missing'], ['--secondary', '#A68A64', 'brand brown'],\n          ['--accent', '#A8C3A0', 'success / found'], ['--foreground', '#3D3D3D', 'text'],\n          ['--muted', '#E8DCCB', 'fields / fills'], ['--destructive', '#E08A6A', 'lost / error'],\n        ]},\n        { g: 'Radius & type', rows: [\n          ['--radius', '0.75rem', 'base 12px'], ['--radius-card', '1.25rem', '20px'],\n          ['--font-head', 'Quicksand', 'headings'], ['--font-body', 'Nunito', 'body'],\n        ]},\n      ],\n      states: [\n        { t: 'Empty', c: '#A68A64', bg: '#F7F3EE', ex: '\"No pets yet — add your furry friend to create a QR tag.\" + primary CTA. Never a blank screen.' },\n        { t: 'Loading', c: '#A68A64', bg: '#F7F3EE', ex: 'Skeleton cards in muted beige; spinner only for actions > 1s. Optimistic UI on sighting submit.' },\n        { t: 'Success', c: '#5e8a52', bg: '#EEF4EC', ex: '\"Sighting sent — the owner has been notified.\" Sage toast, 4s auto-dismiss. Reunion = celebratory 🎉.' },\n        { t: 'Error', c: '#c0623a', bg: '#FBEEE7', ex: '\"Couldn\\u2019t upload photo — max 5 MB.\" Plain-language, names the fix, never a code. Retry stays available.' },\n      ],\n      voice: [\n        ['Warm, not cutesy', 'Help bring Buddy home', 'Submit pet retrieval request'],\n        ['Plain language', 'When was Buddy last seen?', 'Specify last-known temporal coordinate'],\n        ['Calm in crisis', 'We\\u2019ve alerted helpers nearby', 'ALERT DISPATCHED TO 142 USERS'],\n        ['Names the pet', 'Mark Buddy as found', 'Close case #4821'],\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
